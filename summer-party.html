<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Summer Party Saree Solution | VarnaVastra</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#fdf6f0,#fff);
text-align:center;
color:#333;
}

.container{
padding:40px 20px;
}

.logo{
width:160px;
margin-bottom:20px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:450px;
margin:auto;
}

h1{
font-size:26px;
margin-bottom:15px;
}

p{
font-size:18px;
line-height:1.6;
}

.btn{
margin-top:25px;
padding:15px 25px;
border:none;
border-radius:30px;
background:#d14b6a;
color:white;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#b93c59;
}

.solution{
display:none;
margin-top:20px;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

.insta{
display:inline-block;
margin-top:20px;
padding:12px 20px;
background:#e1306c;
color:white;
border-radius:25px;
text-decoration:none;
font-size:16px;
}

.sparkle{
position:fixed;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<div class="card">

<h1>Summer Party Tonight? ☀️</h1>

<p>
Silk feels heavy…<br>
Regular cotton feels too simple…
</p>

<button class="btn" onclick="showSolution()">Find the Solution</button>

<div class="solution" id="solution">

<h2>✨ VarnaVastra Cotton Party Sarees</h2>

<p>
Comfort of cotton.<br>
Elegance of a party look.
</p>

<a class="insta" href="https://instagram.com/varnavastra4you" target="_blank">
Explore on Instagram
</a>

</div>

</div>
</div>

<script>

function showSolution(){
document.getElementById("solution").style.display="block";
createSparkles();
}

function createSparkles(){
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(Math.random()*2+2)+"s";
document.body.appendChild(s);
}
}

</script>

</body>
</html>
