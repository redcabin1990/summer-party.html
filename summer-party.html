<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VarnaVastra Summer Party</title>

<style>
<h2>TEST VERSION 2</h2>
body{
font-family:Arial;
text-align:center;
margin:0;
padding:40px;
background:linear-gradient(135deg,#fff2ef,#fffdfb);
overflow-x:hidden;
}

/* logo */

.logo{
width:150px;
margin-bottom:30px;
}

/* problem text */

.problem{
font-size:24px;
line-height:1.5;
}

/* button */

button{
background:#c84a63;
color:white;
padding:16px 35px;
border:none;
border-radius:30px;
font-size:18px;
margin-top:35px;
cursor:pointer;
}

button:hover{
background:#a63b51;
}

/* solution section */

#solution{
display:none;
margin-top:40px;
animation:fade 1s;
}

.solution-title{
font-size:28px;
color:#c84a63;
margin-bottom:15px;
}

/* saree image */

.saree{
width:260px;
margin-top:20px;
opacity:0;
transform:scale(0.7);
transition:1s;
}

/* instagram button */

.instagram{
display:inline-block;
margin-top:25px;
padding:12px 25px;
border-radius:25px;
border:2px solid #c84a63;
text-decoration:none;
color:#c84a63;
font-size:16px;
}

.instagram:hover{
background:#c84a63;
color:white;
}

/* animation */

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* confetti */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
opacity:0.8;
animation:fall 3s linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
}
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<div class="problem">

Too hot for silk sarees in summer?<br><br>

But still want a perfect party look?

</div>

<button onclick="showSolution()">
Find the Solution
</button>

<div id="solution">

<div class="solution-title">

✨ VarnaVastra Cotton Party Sarees

</div>

Comfort of cotton.<br>
Elegance of a party look for summer evenings.

<br>

<img src="https://images.unsplash.com/photo-1610030469668-2b5c9a9cfd66?auto=format&fit=crop&w=500&q=60" class="saree" id="saree">
<br>

<a class="instagram"
href="https://instagram.com/varnavastra4you"
target="_blank">

Explore on Instagram

</a>

</div>

<script>

function showSolution(){

document.getElementById("solution").style.display="block";

let saree=document.getElementById("saree");

setTimeout(()=>{
saree.style.opacity=1;
saree.style.transform="scale(1)";
},300);

startConfetti();

}

function startConfetti(){

for(let i=0;i<60;i++){

let conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=
["#ff4d6d","#ffd166","#06d6a0","#118ab2","#ef476f"][Math.floor(Math.random()*5)];

conf.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(conf);

}

}

</script>

</body>
</html>
