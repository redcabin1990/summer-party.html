<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Summer Party Saree</title>

<style>

body{
font-family: Arial;
background:linear-gradient(135deg,#fff5f0,#ffffff);
text-align:center;
padding:40px;
}

.logo{
width:150px;
margin-bottom:20px;
}

.problem{
font-size:22px;
margin-top:40px;
}

button{
background:#c84a63;
color:white;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
margin-top:30px;
cursor:pointer;
}

button:hover{
background:#a83d53;
}

#solution{
display:none;
margin-top:40px;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.solution-title{
font-size:26px;
color:#c84a63;
margin-bottom:10px;
}

.instagram{
display:inline-block;
margin-top:20px;
background:#ffffff;
color:#c84a63;
border:2px solid #c84a63;
padding:12px 25px;
border-radius:25px;
text-decoration:none;
font-size:16px;
}

.instagram:hover{
background:#c84a63;
color:white;
}

</style>

</head>

<body>

<img src="logo.png" class="logo">

<div class="problem">

Too hot for silk sarees in summer?<br><br>

But still want a perfect party look?

</div>

<button onclick="showSolution()">
Find the Solution
</button>

<div id="solution">

<div class="solution-title">
✨ VarnaVastra Cotton Party Sarees
</div>

Comfort of cotton.<br>
Elegance of a party look.

<br><br>

<a class="instagram"
href="https://instagram.com/varnavastra4you"
target="_blank">

Explore on Instagram

</a>

</div>

<script>

function showSolution(){
document.getElementById("solution").style.display="block";
}

</script>

</body>
</html>
